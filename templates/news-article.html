<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="$summary">
    <title>$title — Freyr AI</title>
    <link rel="icon" href="../../public/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../../styles.css">
  </head>
  <body class="articlePage">
    <header class="articleHeader">
      <a class="brand" href="../../" aria-label="Freyr home">
        <img src="../../public/freyr-logo-transparent.png" width="520" height="170" alt="Freyr">
      </a>
      <a class="articleBack" href="../">All news</a>
    </header>
    <main>
      <article class="article">
        <p class="articleMeta">$display_date · $category</p>
        <h1>$title</h1>
        <p class="articleSummary">$summary</p>
        <img class="articleCover" src="$article_cover" alt="$title">
        <div class="articleBody">
$body
        </div>
      </article>
    </main>
  </body>
</html>
